<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Versioned deliberately. Browsers cache favicons harder than almost
         anything else and routinely ignore Cache-Control on them, so a changed
         icon can sit unseen for days. Bump ?v= whenever favicon.svg changes. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Gigil!</title>
    <meta name="description" content="Don't hold it in. Let the feeling out before it takes over. A browser stress toy." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
