<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Gigil">
  <!--
    The brand mark: a face mid-scowl.

    Stroked rather than filled, and built from four shapes only - ring, two
    brows, two eyes, one mouth. Anger is legible in almost nothing: the brows
    doing the work is why this survives being shrunk to a favicon, where a
    detailed face averages into a grey disc.

    Transparent behind the mark so it can sit on the shard field, a panel or a
    press kit without carrying a plate around with it. favicon.svg is the same
    drawing on a dark tile, because a browser tab has no background to sit on.
  -->
  <g fill="none" stroke="#ff5d47" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="32" cy="32" r="23.4"/>
    <!-- Brows: outer ends high, inner ends low. That V is the whole expression. -->
    <path d="M18.6 24.2 29.4 30.4"/>
    <path d="M45.4 24.2 34.6 30.4"/>
    <!-- Mouth: corners down, middle up. -->
    <path d="M21.4 45.6Q32 36.8 42.6 45.6"/>
  </g>
  <circle cx="23.4" cy="33.4" r="3.5" fill="#ff5d47"/>
  <circle cx="40.6" cy="33.4" r="3.5" fill="#ff5d47"/>
</svg>
