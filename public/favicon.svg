<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    Same mark as logo.svg, on a tile because a browser tab gives it nothing to
    sit on. The ring is tightened and every stroke thickened: at 16px the
    logo's proportions thin out to a smudge, and the silhouette has to survive
    before the expression does.
  -->
  <rect width="64" height="64" rx="14" fill="#12141c"/>
  <g fill="none" stroke="#ff5d47" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="32" cy="32" r="21.6"/>
    <path d="M19.8 25 29.2 30.6"/>
    <path d="M44.2 25 34.8 30.6"/>
    <path d="M22.2 44.8Q32 36.6 41.8 44.8"/>
  </g>
  <circle cx="23.8" cy="33.6" r="3.8" fill="#ff5d47"/>
  <circle cx="40.2" cy="33.6" r="3.8" fill="#ff5d47"/>
</svg>
